<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eQro.sit - Q PDF Hub & Q Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            --danger: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
            --glass: rgba(255,255,255,0.1);
            --white-glass: rgba(255,255,255,0.95);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--primary);min-height:100vh;color:#333;overflow-x:hidden;}
        
        .logo-header{background:var(--white-glass);backdrop-filter:blur(30px);padding:1.2rem 2rem;box-shadow:0 15px 35px rgba(0,0,0,0.15);position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;}
        .main-logo{font-size:2.8rem;font-weight:900;background:var(--primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:1rem;}
        .logo-icon{font-size:3.5rem;animation:pulse 2s infinite;}
        @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
        
        .search-container{position:relative;flex:1;max-width:500px;margin:0 2rem;}
        .search-input{width:100%;padding:1.3rem 1.3rem 1.3rem 4.5rem;border:3px solid transparent;border-radius:30px;font-size:1.1rem;background:rgba(255,255,255,0.9);transition:all 0.3s ease;box-shadow:0 10px 25px rgba(0,0,0,0.1);}
        .search-input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,0.15);}
        .search-icon{position:absolute;left:1.5rem;top:50%;transform:translateY(-50%);font-size:1.4rem;color:#667eea;}
        
        .nav-container{background:var(--white-glass);backdrop-filter:blur(25px);margin:2rem 0;border-radius:25px;box-shadow:0 20px 40px rgba(0,0,0,0.1);border:1px solid rgba(255,255,255,0.3);}
        .nav-tabs{display:flex;justify-content:center;padding:1.5rem;}
        .nav-tab{padding:1.2rem 2.8rem;margin:0 0.5rem;border-radius:50px;font-weight:800;cursor:pointer;transition:all 0.4s ease;color:#4a5568;border:3px solid transparent;background:rgba(255,255,255,0.7);position:relative;display:flex;align-items:center;gap:0.8rem;}
        .nav-tab::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--primary);transition:left 0.4s ease;z-index:-1;border-radius:50px;}
        .nav-tab.active::before,.nav-tab:hover::before{left:0;}
        .nav-tab.active,.nav-tab:hover{color:white!important;transform:translateY(-5px);border-color:#667eea;box-shadow:0 20px 40px rgba(102,126,234,0.4);}
        
        .main-content{max-width:1400px;margin:0 auto;padding:0 2rem;}
        .section{display:none;}
        .section.active{display:block;}
        .hero-title{text-align:center;font-size:clamp(2.8rem,6vw,5rem);font-weight:900;background:linear-gradient(45deg,white,rgba(255,255,255,0.8));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:3rem 0 4rem;}
        
        .pdf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:2.5rem;}
        .pdf-card{background:var(--white-glass);backdrop-filter:blur(20px);border-radius:30px;padding:3rem 2rem;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,0.15);transition:all 0.4s ease;border:1px solid rgba(255,255,255,0.4);}
        .pdf-card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:var(--primary);}
        .pdf-card:hover{transform:translateY(-15px);box-shadow:0 40px 80px rgba(0,0,0,0.25);}
        .pdf-icon{font-size:5rem;margin-bottom:2rem;}
        .pdf-name{font-size:1.6rem;font-weight:900;margin-bottom:1rem;color:#1a202c;}
        .pdf-size{color:#718096;font-size:1.2rem;margin-bottom:2.5rem;font-weight:600;}
        .pdf-download{width:100%;background:var(--secondary);color:white;border:none;padding:1.2rem 3rem;border-radius:50px;cursor:pointer;font-weight:800;font-size:1.1rem;transition:all 0.3s ease;box-shadow:0 10px 25px rgba(72,187,120,0.4);}
        .pdf-download:hover{transform:translateY(-3px);box-shadow:0 20px 40px rgba(72,187,120,0.6);}
        
        .shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:3rem;}
        .shop-card{background:var(--white-glass);backdrop-filter:blur(25px);border-radius:30px;padding:2.5rem;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,0.15);transition:all 0.4s ease;border:1px solid rgba(255,255,255,0.4);}
        .shop-card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:var(--secondary);}
        .shop-card:hover{transform:translateY(-15px);box-shadow:0 40px 80px rgba(0,0,0,0.25);}
        
        /* FIXED Product Image */
        .shop-image{ width:180px;height:180px;border-radius:20px;margin:0 auto 1.5rem;object-fit:cover;background:#f0f0f0;border:4px solid rgba(255,255,255,0.8);box-shadow:0 15px 30px rgba(0,0,0,0.2);transition:all 0.4s ease;}
        .shop-image.emoji{font-size:5rem !important;display:flex;align-items:center;justify-content:center;border-radius:20px;background:linear-gradient(135deg,#f7fafc,#e2e8f0) !important;}
        .shop-card:hover .shop-image{transform:scale(1.05);}
        
        .shop-name{font-size:1.5rem;font-weight:900;color:#1a202c;margin-bottom:0.8rem;}
        .shop-price{font-size:2.2rem;font-weight:900;color:#48bb78;margin-bottom:2rem;}
        .messenger-contact{width:100%;background:#0084ff;color:white;border:none;padding:1.2rem 2rem;border-radius:50px;cursor:pointer;font-weight:800;font-size:1.1rem;transition:all 0.3s ease;box-shadow:0 10px 25px rgba(0,132,255,0.4);display:flex;align-items:center;justify-content:center;gap:1rem;text-decoration:none;}
        .messenger-contact:hover{transform:translateY(-3px);box-shadow:0 20px 40px rgba(0,132,255,0.6);}
        
        .admin-panel{display:none;background:var(--white-glass);backdrop-filter:blur(25px);padding:3rem;border-radius:30px;margin:3rem 0;box-shadow:0 30px 60px rgba(0,0,0,0.2);}
        .admin-title{text-align:center;font-size:2.5rem;margin-bottom:2rem;color:#2d3748;}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:2rem;}
        .form-section{background:rgba(255,255,255,0.8);padding:2rem;border-radius:20px;}
        .form-section h3{font-size:1.6rem;margin-bottom:1.5rem;color:#2d3748;}
        .form-group{margin-bottom:1.5rem;}
        .form-label{display:block;margin-bottom:0.5rem;font-weight:700;color:#2d3748;font-size:1.1rem;}
        .form-input{width:100%;padding:1rem;border:2px solid #e2e8f0;border-radius:12px;font-size:1rem;background:#f8fafc;transition:all 0.3s;}
        .form-input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.1);}
        .image-preview{width:100px;height:100px;border-radius:10px;object-fit:cover;margin-top:0.5rem;display:none;border:2px solid #e2e8f0;}
        .admin-buttons{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;}
        .btn{padding:1rem 2rem;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:1rem;transition:all 0.3s;box-shadow:0 8px 20px rgba(0,0,0,0.15);}
        .btn-primary{background:var(--primary);color:white;}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 15px 30px rgba(102,126,234,0.4);}
        .btn-danger{background:var(--danger);color:white;}
        .btn-danger:hover{transform:translateY(-2px);box-shadow:0 15px 30px rgba(245,101,101,0.4);}
        
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:3000;justify-content:center;align-items:center;}
        .modal-content{background:white;padding:3rem;border-radius:25px;max-width:450px;width:90%;text-align:center;box-shadow:0 30px 60px rgba(0,0,0,0.4);}
        .about-section{background:var(--glass);backdrop-filter:blur(20px);border-radius:25px;padding:3rem 2rem;margin:3rem 0;text-align:center;color:white;}
        .messenger-icon{position:fixed;bottom:20px;right:20px;width:70px;height:70px;background:#0084ff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 25px rgba(0,132,255,0.4);z-index:1000;color:white;font-size:1.8rem;transition:all 0.3s;text-decoration:none;}
        .messenger-icon:hover{transform:scale(1.1);box-shadow:0 15px 35px rgba(0,132,255,0.6);}
        .empty-state{padding:6rem 2rem;background:var(--glass);border-radius:25px;text-align:center;color:white;}
        
        @media (max-width:768px){
            .nav-tabs{flex-direction:column;padding:1rem;}
            .pdf-grid,.shop-grid{grid-template-columns:1fr;}
            .form-grid{grid-template-columns:1fr;}
            .logo-header{flex-direction:column;gap:1rem;text-align:center;}
        }
    </style>
</head>
<body>
    <a href="https://m.me/" class="messenger-icon" target="_blank"><i class="fab fa-facebook-messenger"></i></a>
    
    <header class="logo-header">
        <div class="main-logo">
            <span class="logo-icon">📱</span>eQro.sit
        </div>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="globalSearch" placeholder="🔎 Search PDFs / Products...">
        </div>
    </header>

    <div class="nav-container">
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="showSection('pdf')"><i class="fas fa-file-pdf"></i> Q PDF Hub</div>
            <div class="nav-tab" onclick="showSection('shop')"><i class="fas fa-store"></i> Q Shop</div>
            <div class="nav-tab" onclick="toggleAdminModal()"><i class="fas fa-cog"></i> Admin</div>
        </div>
    </div>

    <div class="main-content">
        <section id="pdfSection" class="section active">
            <h1 class="hero-title">📚 Q PDF Hub</h1>
            <div id="pdfGrid" class="pdf-grid"></div>
        </section>

        <section id="shopSection" class="section">
            <h1 class="hero-title">🛒 Q Shop</h1>
            <div id="shopGrid" class="shop-grid"></div>
        </section>

        <div id="adminPanel" class="admin-panel" style="display:none;">
            <h2 class="admin-title">🔐 Admin Panel</h2>
            <div class="form-grid">
                <div class="form-section">
                    <h3>📄 PDF Upload</h3>
                    <div class="form-group">
                        <label class="form-label">PDF File</label>
                        <input type="file" id="pdfFile" accept=".pdf" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Title</label>
                        <input type="text" id="pdfTitle" placeholder="Document Name" class="form-input">
                    </div>
                </div>
                <div class="form-section">
                    <h3>🛒 Product Add</h3>
                    <div class="form-group">
                        <label class="form-label">Product Image</label>
                        <input type="file" id="productImage" accept="image/*" class="form-input" onchange="previewImage(this)">
                        <img id="imagePreview" class="image-preview" alt="Preview">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Product Name</label>
                        <input type="text" id="productName" placeholder="Product Name" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Price (৳)</label>
                        <input type="number" id="productPrice" placeholder="500" class="form-input">
                    </div>
                </div>
            </div>
            <div class="admin-buttons">
                <button class="btn btn-primary" onclick="uploadPDF()">📤 Upload PDF</button>
                <button class="btn btn-primary" onclick="addProduct()">➕ Add Product</button>
                <button class="btn btn-danger" onclick="clearAllPDFs()">🗑️ Clear PDFs</button>
                <button class="btn btn-danger" onclick="clearAllProducts()">🗑️ Clear Products</button>
            </div>
        </div>

        <section class="about-section">
            <h2 style="font-size:2rem;margin-bottom:1.5rem;">✅ সব Features Working</h2>
            <p>🖼️ আসল Product Image • 📄 PDF Download • 💾 Local Storage Save</p>
            <div style="display:flex;gap:1.5rem;justify-content:center;margin-top:2rem;flex-wrap:wrap;">
                <a href="https://youtube.com/@shihabsharar-j4p" target="_blank" style="color:white;text-decoration:none;font-weight:600;">
                    <i class="fab fa-youtube" style="font-size:2rem;color:#FF0000;"></i> YouTube
                </a>
                <a href="https://m.me/" target="_blank" style="color:white;text-decoration:none;font-weight:600;">
                    <i class="fab fa-facebook-messenger" style="font-size:2rem;color:#0084ff;"></i> Messenger
                </a>
            </div>
        </section>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeAdminModal()">&times;</span>
            <h2>🔐 Admin Login</h2>
            <input type="password" id="adminPass" class="form-input" placeholder="Password" style="margin:1.5rem 0 2rem;font-size:1.2rem;">
            <button class="btn btn-primary" onclick="verifyAdmin()" style="padding:1rem 3rem;">Login</button>
        </div>
    </div>

    <script>
        const ADMIN_PASS = "Shi567hab";
        let pdfs = JSON.parse(localStorage.getItem('eqro_pdfs')) || [{name:"Sample.pdf",size:"1.2 MB"}];
        let products = JSON.parse(localStorage.getItem('eqro_products')) || [{name:"T-Shirt",price:499,image:"👕"}];

        function saveData() {
            localStorage.setItem('eqro_pdfs', JSON.stringify(pdfs));
            localStorage.setItem('eqro_products', JSON.stringify(products));
        }

        // FIXED PDF Download - Real PDF
        function downloadPDF(filename) {
            const pdfContent = `%PDF-1.3
1 0 obj<</Type/Catalog/Pages 2 0 R>>endobj
2 0 obj<</Type/Pages/Kids[3 0 R]/Count 1>>endobj
3 0 obj<</Type/Page/Parent 2 0 R/MediaBox[0 0 612 792]/Contents 4 0 R/Resources<</Font<</F1 5 0 R>>>>>endobj
4 0 obj<</Length 100>>stream
BT/F1 24 Tf 100 700 Td(${filename})Tj 100 650 Td(eQro.sit PDF)Tj ET
endstream endobj
5 0 obj<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>endobj
xref
0 6
0000000000 65535 f 
0000000010 00000 n 
0000000074 00000 n 
0000000118 00000 n 
0000000220 00000 n 
0000000305 00000 n 
trailer<</Size 6/Root 1 0 R>>
startxref
450
%%EOF`;
            
            const blob = new Blob([pdfContent], {type: 'application/pdf'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function showSection(section) {
            document.querySelectorAll('.section, .nav-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(section+'Section').classList.add('active');
            event.target.classList.add('active');
            if(section === 'pdf') renderPDFs();
            else renderProducts();
        }

        function renderPDFs(filter='') {
            const filtered = pdfs.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            document.getElementById('pdfGrid').innerHTML = filtered.length ? 
            filtered.map(p => `
                <div class="pdf-card" style="position:relative;">
                    <div class="pdf-icon">📄</div>
                    <div class="pdf-name">${p.name}</div>
                    <div class="pdf-size">${p.size}</div>
                    <button class="pdf-download" onclick="downloadPDF('${p.name}')">
                        <i class="fas fa-download"></i> Download PDF
                    </button>
                </div>`).join('') : 
            `<div class="empty-state"><div style="font-size:4rem;margin-bottom:1rem">📄</div><h3>কোনো PDF নেই</h3></div>`;
        }

        // FIXED Product Image Display
        function renderProducts(filter='') {
            const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            document.getElementById('shopGrid').innerHTML = filtered.length ? 
            filtered.map(p => {
                const imgSrc = p.image.startsWith('data:image/') ? p.image : '';
                return `
                <div class="shop-card" style="position:relative;">
                    ${imgSrc ? 
                        `<img src="${imgSrc}" alt="${p.name}" class="shop-image" onerror="this.outerHTML='<div class=\\'shop-image emoji\\'>${p.image || '📦'}</div>'">` :
                        `<div class="shop-image emoji">${p.image || '📦'}</div>`
                    }
                    <div class="shop-name">${p.name}</div>
                    <div class="shop-price">৳${p.price}</div>
                    <a href="https://m.me/" target="_blank" class="messenger-contact">
                        <i class="fab fa-facebook-messenger"></i> Messenger Order
                    </a>
                </div>`;
            }).join('') : 
            `<div class="empty-state"><div style="font-size:4rem;margin-bottom:1rem">🛒</div><h3>কোনো Product নেই</h3></div>`;
        }

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function uploadPDF() {
            const file = document.getElementById('pdfFile').files[0];
            const title = document.getElementById('pdfTitle').value;
            if (!file || !title) return alert('❌ PDF + Title দিন');
            if (file.type !== 'application/pdf') return alert('❌ PDF file হতে হবে');
            
            pdfs.unshift({name: title, size: (file.size/1024/1024).toFixed(1) + ' MB'});
            saveData();
            renderPDFs();
            document.getElementById('pdfFile').value = '';
            document.getElementById('pdfTitle').value = '';
            alert('✅ PDF Saved!');
        }

        async function addProduct() {
            const imgFile = document.getElementById('productImage').files[0];
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            
            if (!name || !price) return alert('❌ Name + Price দিন');
            
            let imageData = '📦';
            if (imgFile) {
                imageData = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(imgFile);
                });
            }
            
            products.unshift({name, price, image: imageData});
            saveData();
            renderProducts();
            
            document.getElementById('productImage').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            alert('✅ Product + Image Saved!');
        }

        function clearAllPDFs() {
            if(confirm('সব PDF মুছবেন?')) {
                pdfs = [];
                saveData();
                renderPDFs();
                alert('✅ PDFs cleared!');
            }
        }

        function clearAllProducts() {
            if(confirm('সব Product মুছবেন?')) {
                products = [];
                saveData();
                renderProducts();
                alert('✅ Products cleared!');
            }
        }

        function toggleAdminModal() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; document.getElementById('adminPass').value = ''; }
        function verifyAdmin() {
            if(document.getElementById('adminPass').value === ADMIN_PASS) {
                closeAdminModal();
                document.getElementById('adminPanel').style.display = 'block';
                alert('✅ Admin Login Success!');
            } else {
                alert('❌ Wrong Password!');
                document.getElementById('adminPass').value = '';
            }
        }

        // Search + Init
        document.addEventListener('DOMContentLoaded', () => {
            renderPDFs();
            renderProducts();
            document.getElementById('globalSearch').addEventListener('input', e => {
                const q = e.target.value;
                const active = document.querySelector('.section.active').id;
                active.includes('pdf') ? renderPDFs(q) : renderProducts(q);
            });
        });

        document.addEventListener('click', e => e.target.id === 'adminModal' && closeAdminModal());
        document.addEventListener('keydown', e => e.key === 'Escape' && closeAdminModal());
    </script>
</body>
</html>
