        /* ✅ WhatsApp Floating Icon - PERFECT! */
        .whatsapp-icon {

        .whatsapp-icon::before {

            border-color: rgba(255,255,255,0.6);
        }
        .whatsapp-icon:hover::before {
            opacity: 1;

        .whatsapp-icon:active {

        .empty-state{padding:6rem 2rem;background:var(--glass);border-radius:25px;text-align:center;color:white;}
        
        @media (max-width:768px){

    <script>
        const ADMIN_PASS = "Shi567hab";
        
        // Storage functions
        function getData(key, defaultData = []) {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : defaultData;
            } catch(e) { return defaultData; }
        }
        function saveData(key, data) {
            try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
        }

        let pdfs = getData('eqro_pdfs', [{id:1,name:"Sample PDF.pdf",size:"1.2 MB",fileData:null}]);
        let products = getData('eqro_products', [{id:1,name:"T-Shirt",price:499,image:"👕"}]);

        function downloadPDF(id) {
            const pdf = pdfs.find(p => p.id == id);
            if(!pdf || !pdf.fileData) {
                alert('❌ PDF file data নেই! আবার upload করুন।');
                return;
            }
            const blob = new Blob([pdf.fileData], {type: 'application/pdf'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = pdf.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert(`✅ "${pdf.name}" Downloaded! (${pdf.size})`);
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
            document.getElementById(section+'Section').classList.add('active');
            event.target.closest('.nav-tab').classList.add('active');
            if(section==='pdf') renderPDFs();
            else renderProducts();
        }

        function renderPDFs(filter='') {
            const filtered = pdfs.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            const grid = document.getElementById('pdfGrid');
            if(!filtered.length){
                grid.innerHTML = `<div class="empty-state"><div style="font-size:5rem;margin-bottom:2rem">📄</div><h2>কোনো PDF নেই</h2><p>Admin থেকে upload করুন</p></div>`;
                return;
            }
            grid.innerHTML = filtered.map(pdf => `
                <div class="pdf-card">
                    <div class="pdf-icon">📄</div>
                    <div class="pdf-name">${pdf.name}</div>
                    <div class="pdf-size">${pdf.size}</div>
                    <button class="pdf-download" onclick="downloadPDF(${pdf.id})">
                        <i class="fas fa-download"></i> Download PDF
                    </button>
                </div>
            `).join('');
        }

        function renderProducts(filter='') {
            const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            const grid = document.getElementById('shopGrid');
            if(!filtered.length){
                grid.innerHTML = `<div class="empty-state"><div style="font-size:5rem;margin-bottom:2rem">🛒</div><h2>কোনো Product নেই</h2></div>`;
                return;
            }
            grid.innerHTML = filtered.map(p => `
                <div class="shop-card">
                    ${p.image && p.image.startsWith('data:image/') ? 
                        `<img src="${p.image}" alt="${p.name}" class="shop-image" onerror="this.outerHTML='<div class=\\'shop-image emoji\\'>📦</div>'">` : 
                        `<div class="shop-image emoji">${p.image || '📦'}</div>`
                    }
                    <div class="shop-name">${p.name}</div>
                    <div class="shop-price">৳${p.price}</div>
                    <a href="https://wa.me/8801920037889?text=Hi%20eQro.sit%20-%20${p.name}%20order%20%7C%20Price:%20${p.price}৳" target="_blank" class="whatsapp-contact">
                        <i class="fab fa-whatsapp"></i> Order করুন
                    </a>
                </div>
            `).join('');
        }

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            if(input.files[0]){
                const reader = new FileReader();
                reader.onload = e => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function uploadPDF() {
            const file = document.getElementById('pdfFile').files[0];
            const title = document.getElementById('pdfTitle').value.trim();
            
            if(!file) return alert('❌ PDF file select করুন');
            if(!title) return alert('❌ Title দিন');
            if(file.type !== 'application/pdf') return alert('❌ PDF file হতে হবে!');
            
            const sizeMB = (file.size / 1024 / 1024).toFixed(1);
            const sizeDisplay = sizeMB > 1 ? `${sizeMB} MB` : `${(file.size / 1024).toFixed(1)} KB`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const newPDF = {
                    id: Date.now(),
                    name: title + '.pdf',
                    size: sizeDisplay,
                    fileData: e.target.result
                };
                
                pdfs.unshift(newPDF);
                saveData('eqro_pdfs', pdfs);
                renderPDFs();
                
                document.getElementById('pdfFile').value = '';
                document.getElementById('pdfTitle').value = '';
                alert(`✅ "${newPDF.name}" uploaded!
📏 Size: ${newPDF.size}`);
            };
            reader.readAsArrayBuffer(file);
        }

        async function addProduct() {
            const imgFile = document.getElementById('productImage').files[0];
            const name = document.getElementById('productName').value.trim();
            const price = document.getElementById('productPrice').value;
            
            if(!name || !price) return alert('❌ Name + Price দিন');
            
            let imageData = '👕';
            if(imgFile){
                imageData = await new Promise(r=> {
                    const reader = new FileReader();
                    reader.onload = ()=>r(reader.result);
                    reader.readAsDataURL(imgFile);
                });
            }
            
            products.unshift({id: Date.now(), name, price, image: imageData});
            saveData('eqro_products', products);
            renderProducts();
            
            document.getElementById('productImage').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            alert(`✅ "${name}" added!`);
        }

        function clearAllPDFs() {
            if(confirm('সব PDF মুছবেন?')) {
                pdfs = []; saveData('eqro_pdfs', pdfs); renderPDFs(); alert('✅ PDFs cleared!');
            }
        }

        function clearAllProducts() {
            if(confirm('সব Product মুছবেন?')) {
                products = []; saveData('eqro_products', products); renderProducts(); alert('✅ Products cleared!');
            }
        }

        function toggleAdminModal(){document.getElementById('adminModal').style.display='flex';}
        function closeAdminModal(){document.getElementById('adminModal').style.display='none';document.getElementById('adminPass').value='';}
        function verifyAdmin(){
            if(document.getElementById('adminPass').value===ADMIN_PASS){
                closeAdminModal();
                document.getElementById('adminPanel').style.display='block';
                alert('✅ Admin Login!');
            }else{
                alert('❌ Wrong Password!');
                document.getElementById('adminPass').value='';
            }
        }

        document.addEventListener('DOMContentLoaded',()=>{
            renderPDFs();
            renderProducts();
            
            document.querySelectorAll('.nav-tab[data-section]').forEach(tab=>{
                tab.addEventListener('click', function(){
                    showSection(this.dataset.section);
                });
            });
            
            document.getElementById('globalSearch').addEventListener('input',e=>{
                const q = e.target.value;
                const activeSection = document.querySelector('.section.active').id;
                if(activeSection.includes('pdf')) renderPDFs(q);
                else renderProducts(q);
            });
        });

        document.addEventListener('click',e=>e.target.id==='adminModal'&&closeAdminModal());
        document.addEventListener('keydown',e=>e.key==='Escape'&&closeAdminModal());
    </script>
</body>
</html>
